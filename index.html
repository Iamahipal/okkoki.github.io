<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OKKOKI — Fueling Small Business Growth. Digital marketing, website building and paid media, delivered as a Windows Phone experience on the web.">
    <title>OKKOKI — Fueling Small Business Growth</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="shell">
        <main class="viewport" id="viewport">
            <!-- START SCREEN — tiles are generated from the app registry in script.js -->
            <section class="screen active" id="startScreen">
                <div class="grid-container" id="tileGrid"></div>
                <div class="all-apps">
                    <button class="all-apps-btn" id="allAppsBtn" aria-label="All apps">
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </section>

            <!-- APP LIST SCREEN -->
            <section class="screen" id="appListScreen">
                <div class="search-bar">
                    <button class="search-icon" id="searchToggle" aria-label="Search apps">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <input type="text" id="searchApps" placeholder="search apps" autocomplete="off">
                </div>
                <div class="app-list" id="appList"></div>
            </section>

            <!-- APP SCREEN — built per app -->
            <section class="screen" id="appScreen"></section>

            <!-- Alphabet jump grid overlay -->
            <div class="jump-grid" id="jumpGrid">
                <div class="jump-inner" id="jumpInner"></div>
            </div>
        </main>

        <!-- Navigation bar -->
        <nav class="nav-bar">
            <button class="nav-btn" id="navBack" aria-label="Back"><i class="fa-solid fa-arrow-left"></i></button>
            <button class="nav-btn" id="navStart" aria-label="Start"><i class="fa-brands fa-windows"></i></button>
            <button class="nav-btn" id="navSearch" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
