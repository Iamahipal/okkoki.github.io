    <!-- WP lock screen: swipe/click up to unlock (once per session) -->
    <div class="lock-screen" id="lockScreen">
        <div class="lock-content">
            <div class="lock-time" id="lockTime">12:00</div>
            <div class="lock-date" id="lockDate">Monday, January 1</div>
            <div class="lock-hint"><svg class="icon"><use href="#i-chevron-up"/></svg> swipe up to unlock</div>
        </div>
    </div>

    <div class="shell">
        <main class="viewport" id="viewport">
            <!-- Shared wallpaper layer (glass mode blurs this through the tiles) -->
            <div class="wallpaper-layer" id="wallpaperLayer"></div>

            <!-- START SCREEN — tiles are generated from the app registry in script.js -->
            <section class="screen active" id="startScreen">
                <div class="grid-container" id="tileGrid"></div>
                <div class="all-apps">
                    <button class="all-apps-btn" id="allAppsBtn" aria-label="All apps">
                        <svg class="icon"><use href="#i-arrow-right"/></svg>
                    </button>
                </div>
            </section>

            <!-- APP LIST SCREEN -->
            <section class="screen" id="appListScreen">
                <div class="search-bar">
                    <button class="search-icon" id="searchToggle" aria-label="Search apps">
                        <svg class="icon"><use href="#i-search"/></svg>
                    </button>
                    <input type="text" id="searchApps" placeholder="search apps" autocomplete="off">
                </div>
                <div class="app-list" id="appList"></div>
            </section>

            <!-- APP SCREEN — built per app -->
            <section class="screen" id="appScreen"></section>

            <!-- Alphabet jump grid overlay -->
            <div class="jump-grid" id="jumpGrid">
                <div class="jump-inner" id="jumpInner"></div>
            </div>
        </main>

        <!-- Navigation bar -->
        <nav class="nav-bar">
            <button class="nav-btn" id="navBack" aria-label="Back"><svg class="icon"><use href="#i-arrow-left"/></svg></button>
            <button class="nav-btn" id="navStart" aria-label="Start"><svg class="icon"><use href="#i-windows"/></svg></button>
            <button class="nav-btn" id="navSearch" aria-label="Search"><svg class="icon"><use href="#i-search"/></svg></button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
